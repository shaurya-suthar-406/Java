<!DOCTYPE html>
<html>
<head>
    <title>HTML Lab Exercise</title>
</head>
<body>

    <!-- Navigation Menu -->
    <h2>Navigation Menu</h2>
    <a href="#home">Home</a> |
    <a href="#about">About</a> |
    <a href="#contact">Contact</a>

    <hr>

    <!-- Form -->
    <h2>Registration Form</h2>
    <form>
        <label>Name:</label>
        <input type="text" name="name"><br><br>

        <label>Email:</label>
        <input type="email" name="email"><br><br>

        <label>Password:</label>
        <input type="password" name="password"><br><br>

        <input type="submit" value="Submit">
    </form>

    <hr>

    <!-- Table -->
    <h2>User Data Table</h2>
    <table border="1">
        <tr>
            <th>Name</th>
            <th>Email</th>
        </tr>
        <tr>
            <td>Shaurya</td>
            <td>shaurya@email.com</td>
        </tr>
        <tr>
            <td>Rahul</td>
            <td>rahul@email.com</td>
        </tr>
    </table>

    <hr>

    <!-- Image -->
    <h2>Image Section</h2>
    <img src="https://via.placeholder.com/150" alt="Sample Image">

    <hr>

    <!-- Lists -->
    <h2>Lists</h2>

    <h3>Unordered List</h3>
    <ul>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ul>

    <h3>Ordered List</h3>
    <ol>
        <li>Learn HTML</li>
        <li>Learn CSS</li>
        <li>Learn Java</li>
    </ol>

</body>
</html>
