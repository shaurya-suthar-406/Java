<!DOCTYPE html>
<html>
<head>
    <title>CSS Types Example</title>

    <!-- Internal CSS -->
    <style>
        h2 {
            color: green;
            text-align: center;
        }
    </style>

    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Inline CSS -->
    <h1 style="color: blue;">This is Inline CSS</h1>

    <!-- Internal CSS -->
    <h2>This is Internal CSS</h2>

    <!-- External CSS -->
    <p>This is External CSS</p>

</body>
</html>
